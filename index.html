<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivní Metr & Teleport Dat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: #00e5ff; margin-bottom: 20px; font-size: 24px; text-shadow: 0 0 10px rgba(0,229,255,0.2); }
        
        .hidden { display: none !important; }

        .camera-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #0d0d0d;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #webcam { display: none; width: 100%; height: 100%; object-fit: cover; }
        .target-box {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            border: 3px dashed #00e5ff;
            border-radius: 6px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .camera-placeholder { color: #555; font-size: 14px; font-weight: bold; }

        .signal-container {
            width: 100%; background: #222; border-radius: 6px; height: 25px;
            margin-bottom: 15px; overflow: hidden; border: 1px solid #333; position: relative;
        }
        .signal-bar {
            width: 0%; height: 100%; background: linear-gradient(90deg, #002244, #00e5ff);
            transition: width 0.05s ease;
        }
        .signal-text {
            position: absolute; width: 100%; text-align: center; font-size: 12px;
            font-weight: bold; line-height: 25px; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .calibration-mode {
            background: #252525; padding: 12px; border-radius: 8px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px; border: 1px solid #333;
        }
        .calibration-mode input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; }
        .calibration-mode label { font-size: 14px; color: #ccc; cursor: pointer; user-select: none; }

        /* --- STYLY PRO DIAGNOSTICKÝ PANEL (OSCILOSKOP) --- */
        .debug-panel {
            background: #111; border: 1px solid #444; border-radius: 8px;
            padding: 10px; margin-bottom: 15px; width: 100%;
        }
        .debug-title { font-size: 12px; color: #aaa; margin-bottom: 8px; display: block; text-align: center; }
        .debug-timeline {
            display: flex; width: 100%; height: 30px; background: #000;
            border: 1px solid #555; border-radius: 4px; overflow: hidden;
        }
        .tl-1 { flex: 1; background: #00e5ff; height: 100%; } /* Světlo */
        .tl-0 { flex: 1; background: #1a1a1a; height: 100%; } /* Tma */
        .debug-stats { font-family: monospace; font-size: 11px; color: #00e5ff; margin-top: 8px; text-align: center; }

        .setup-form {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #2a2a2a;
            padding: 15px; border-radius: 12px; margin-bottom: 15px;
        }
        .full-width { grid-column: span 2; }
        select, input {
            background: #1e1e1e; border: 1px solid #444; color: #fff; padding: 10px;
            border-radius: 6px; font-size: 16px; width: 100%; margin-top: 5px;
        }

        .results {
            background: #252525; padding: 15px; border-radius: 12px;
            border-left: 4px solid #00e5ff; margin-bottom: 15px;
        }
        .result-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 16px; }
        .value { font-weight: bold; color: #fff; }
        .promile-large {
            text-align: center; font-size: 52px; font-weight: bold;
            color: #fff; margin: 10px 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .status-text {
            text-align: center; font-size: 14px; color: #00e5ff;
            font-weight: bold; min-height: 20px; margin-top: 10px;
        }
        
        button {
            width: 100%; background: #00e5ff; color: #000; border: none;
            padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: 0.2s;
        }
        button:hover { background: #00b8cc; }
        #analyzer-canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>💙 PIVNÍ TELEPORT</h1>
    
    <div id="scanner-view">
        <div class="camera-container">
            <div id="camera-placeholder" class="camera-placeholder">Kamera čeká na spuštění...</div>
            <video id="webcam" playsinline muted></video>
            <div class="target-box" id="target-box"></div>
        </div>

        <div class="signal-container">
            <div class="signal-bar" id="signal-bar"></div>
            <div class="signal-text" id="signal-text">SIGNÁL: ČEKÁM NA KAMERU</div>
        </div>

        <div class="calibration-mode" id="calib-container">
            <input type="checkbox" id="close-contact-chk">
            <label for="close-contact-chk">Přiloženo těsně (Kalibrovat tmu)</label>
        </div>

        <div id="debug-panel" class="debug-panel hidden">
            <span class="debug-title">Optický osciloskop (Co viděla kamera)</span>
            <div class="debug-timeline" id="debug-timeline"></div>
            <div class="debug-stats" id="debug-stats">Dekódované bajty: [0] [0] [0]</div>
        </div>

        <button id="start-cam-btn">Spustit skenování</button>
        <div class="status-text" id="status-text">Připraveno ke spuštění</div>
    </div>

    <div id="results-view" class="hidden">
        <div class="setup-form">
            <div>
                <span style="font-size: 12px; color: #aaa;">Pohlaví</span>
                <select id="gender">
                    <option value="0.7">Muž</option>
                    <option value="0.6">Žena</option>
                </select>
            </div>
            <div>
                <span style="font-size: 12px; color: #aaa;">Váha (kg)</span>
                <input type="number" id="weight" value="77" min="40" max="200">
            </div>
            <div class="full-width">
                <span style="font-size: 12px; color: #aaa;">Jídlo během pití</span>
                <select id="food">
                    <option value="1.0">Nic (Na lačno)</option>
                    <option value="0.9">Něco málo k zakousnutí</option>
                    <option value="0.8">Střední jídlo (Běžná porce)</option>
                    <option value="0.7">Pořádná večeře</option>
                </select>
            </div>
        </div>

        <div class="results">
            <div class="result-row">
                <span>Vypitých piv (11°):</span>
                <span class="value" id="beer-count-val">0 ks</span>
            </div>
            <div class="result-row">
                <span>Rozpětí pití:</span>
                <span class="value" id="time-val">0 min</span>
            </div>
            <div class="promile-large" id="promile-val">0.00 ‰</div>
            <div class="status-text" id="fun-status" style="margin-top:0;">...</div>
        </div>
        <button id="scan-again-btn" style="margin-top: 20px; background: #333; color: #fff;">Skenovat znovu</button>
    </div>

    <canvas id="analyzer-canvas" width="30" height="30"></canvas>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    
    const scannerView = document.getElementById('scanner-view');
    const resultsView = document.getElementById('results-view');
    const placeholder = document.getElementById('camera-placeholder');
    const targetBox = document.getElementById('target-box');
    const debugPanel = document.getElementById('debug-panel');
    const debugTimeline = document.getElementById('debug-timeline');
    const debugStats = document.getElementById('debug-stats');
    
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-cam-btn');
    const scanAgainBtn = document.getElementById('scan-again-btn');
    const signalBar = document.getElementById('signal-bar');
    const signalText = document.getElementById('signal-text');
    const contactChk = document.getElementById('close-contact-chk');

    document.getElementById('weight').value = localStorage.getItem('alko_weight') || 77;
    document.getElementById('gender').value = localStorage.getItem('alko_gender') || 0.7;
    document.getElementById('food').value = localStorage.getItem('alko_food') || 1.0;
    
    const inputs = ['weight', 'gender', 'food'];
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('change', (e) => {
            localStorage.setItem('alko_' + id, e.target.value);
            calculateAlcohol();
        });
        if(id === 'weight') {
            document.getElementById(id).addEventListener('input', (e) => {
                localStorage.setItem('alko_weight', e.target.value);
                calculateAlcohol();
            });
        }
    });

    let streamActive = false;
    let appState = 'IDLE'; 
    let syncStartTime = 0;
    let recordStartTime = 0;
    
    let collectedSamples = [];
    let beers = 0;
    let minutes = 0;

    let darkIntensity = 0;
    let brightIntensity = 0;
    let dynamicThreshold = 30;
    let calibrationSamples = [];

    startBtn.addEventListener('click', async () => {
        if (streamActive) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', frameRate: { ideal: 30 } },
                audio: false
            });
            video.srcObject = stream;
            video.play();
            streamActive = true;
            
            startBtn.style.display = 'none';
            placeholder.style.display = 'none';
            video.style.display = 'block';
            targetBox.style.display = 'block';
            
            statusText.innerText = "Přilož vypnutou LED a zaškrtni políčko!";
            appState = 'IDLE';
            runMainLoop();
        } catch (err) {
            statusText.innerText = "Chyba kamery: " + err.message;
        }
    });

    scanAgainBtn.addEventListener('click', () => {
        resultsView.classList.add('hidden');
        scannerView.classList.remove('hidden');
        debugPanel.classList.add('hidden');
        appState = 'IDLE';
        contactChk.checked = false;
        statusText.innerText = "Přilož vypnutou LED a zaškrtni políčko!";
    });

    contactChk.addEventListener('change', () => {
        if (contactChk.checked && streamActive) {
            debugPanel.classList.add('hidden'); // Schováme starý debug
            setTimeout(() => {
                darkIntensity = getRawBlue();
                appState = 'WAIT_LIGHT';
                statusText.innerText = "🌑 Tma uložena. Zapni sekvenci na krabičce...";
                targetBox.style.borderColor = "#00e5ff";
            }, 300);
        } else {
            appState = 'IDLE';
            statusText.innerText = "Přilož vypnutou LED a zaškrtni políčko!";
            targetBox.style.borderColor = "#00e5ff";
        }
    });

    function getRawBlue() {
        if (!streamActive || video.videoWidth === 0) return 0;
        ctx.drawImage(video, video.videoWidth/2 - 15, video.videoHeight/2 - 15, 30, 30, 0, 0, 30, 30);
        const imgData = ctx.getImageData(0, 0, 30, 30);
        let totalBlue = 0;
        for (let i = 0; i < imgData.data.length; i += 4) { totalBlue += imgData.data[i+2]; }
        return totalBlue / 900; 
    }

    function runMainLoop() {
        if (!streamActive) return;

        let currentBlue = getRawBlue();
        let displayPercent = Math.min(Math.round(((currentBlue - darkIntensity) / (brightIntensity > darkIntensity ? brightIntensity - darkIntensity : 255 - darkIntensity || 1)) * 100), 100);
        if (displayPercent < 0) displayPercent = 0;

        if (appState === 'IDLE') {
            displayPercent = 0;
            signalText.innerText = "ČEKÁM NA ZAŠKRTNUTÍ KALIBRACE";
        } 
        else if (appState === 'WAIT_LIGHT') {
            signalText.innerText = `ČEKÁM NA SVĚTLO`;
            if (currentBlue > darkIntensity + 20) {
                appState = 'BLIND_SYNC';
                syncStartTime = Date.now();
                calibrationSamples = [];
                targetBox.style.borderColor = "#4caf50";
                targetBox.style.borderStyle = "solid";
            }
        } 
        else if (appState === 'BLIND_SYNC') {
            displayPercent = 100;
            calibrationSamples.push(currentBlue);
            let elapsedMs = Date.now() - syncStartTime;
            
            statusText.innerText = `🔒 SYNC: Ostřím kameru... (${(elapsedMs / 1000).toFixed(1)}s / 3.5s)`;
            signalText.innerText = `IGNORUJI VÝKYVY: ${currentBlue.toFixed(0)}`;
            
            if (elapsedMs >= 3500) {
                appState = 'WAIT_DROP';
                let recentSamples = calibrationSamples.slice(-30);
                brightIntensity = recentSamples.reduce((a,b)=>a+b, 0) / recentSamples.length;
                dynamicThreshold = darkIntensity + (brightIntensity - darkIntensity) * 0.4; // Snížený práh pro větší jistotu čtení světla
                statusText.innerText = "⚠️ PŘIPRAVENO: Čekám na zhasnutí LED...";
            }
        }
        else if (appState === 'WAIT_DROP') {
            displayPercent = 100;
            signalText.innerText = `ČEKÁM NA ZHASNUTÍ (Práh: ${dynamicThreshold.toFixed(0)})`;
            
            if (currentBlue < dynamicThreshold) {
                appState = 'RECORD_DATA';
                recordStartTime = Date.now(); 
                collectedSamples = [];
                
                targetBox.style.borderColor = "#ff9800";
                statusText.innerText = "📥 TELEPORT: Čtu binární data (150ms bit)...";
                setTimeout(decodeExactBinary, 5500);
            }
        }
        else if (appState === 'RECORD_DATA') {
            signalText.innerText = `ČTU BINÁRNÍ KÓD... SÍLA: ${currentBlue.toFixed(0)}`;
            collectedSamples.push({
                time: Date.now(),
                raw: currentBlue,
                bit: (currentBlue > dynamicThreshold) ? 1 : 0
            });
        }

        signalBar.style.width = displayPercent + "%";
        
        if (!scannerView.classList.contains('hidden')) {
            requestAnimationFrame(runMainLoop);
        }
    }

    function decodeExactBinary() {
        appState = 'IDLE'; 
        targetBox.style.borderColor = "#00e5ff";
        targetBox.style.borderStyle = "dashed";
        contactChk.checked = false; 

        if (collectedSamples.length < 20) {
            statusText.innerText = "Chyba: Záznam dat je příliš krátký.";
            return;
        }

        // --- VYKRESLENÍ DIAGNOSTICKÉHO GRAFU (OSCILOSKOPU) ---
        let htmlGraph = "";
        collectedSamples.forEach(sample => {
            htmlGraph += `<div class="tl-${sample.bit}" title="Jas: ${sample.raw.toFixed(0)}"></div>`;
        });
        debugTimeline.innerHTML = htmlGraph;
        debugPanel.classList.remove('hidden');

        // --- DEKÓDOVÁNÍ (STEJNÉ JAKO PŘEDTÍM, S FILTREM HRAN) ---
        let edges = [];
        let currentState = collectedSamples[0].bit;
        
        for (let i = 0; i < collectedSamples.length - 2; i++) {
            let b0 = collectedSamples[i].bit;
            let b1 = collectedSamples[i+1].bit;
            let b2 = collectedSamples[i+2].bit;
            if (b0 === b1 && b1 === b2 && b0 !== currentState) {
                currentState = b0;
                edges.push({ time: collectedSamples[i].time, state: currentState });
            }
        }

        function getBitAtTime(targetTime) {
            let closest = collectedSamples.reduce((a, b) => {
                return Math.abs(b.time - targetTime) < Math.abs(a.time - targetTime) ? b : a;
            });
            return closest.bit;
        }

        let bytes = [];
        let searchStartTime = recordStartTime;

        for (let b = 0; b < 3; b++) {
            let startEdge = edges.find(e => e.time > searchStartTime && e.state === 1);
            if (!startEdge) {
                bytes.push(0);
                continue; // Pokusíme se pokračovat, i když selhal start bit (pro diagnostiku)
            }

            let byteStartTime = startEdge.time;
            let decodedByte = 0;
            let readTime = byteStartTime + 225; 
            
            for (let i = 0; i < 8; i++) {
                if (getBitAtTime(readTime) === 1) { decodedByte |= (1 << i); }
                readTime += 150; 
            }
            bytes.push(decodedByte);
            searchStartTime = readTime + 100; 
        }

        debugStats.innerText = `Dekódované bajty: [${bytes[0]}] [${bytes[1]}] [${bytes[2]}]`;

        if (bytes[0] === 170) {
            beers = bytes[1];
            minutes = bytes[2];

            document.getElementById('beer-count-val').innerText = beers + " ks";
            document.getElementById('time-val').innerText = minutes + " min";
            
            scannerView.classList.add('hidden');
            resultsView.classList.remove('hidden');
            
            calculateAlcohol();
        } else {
            statusText.innerText = `Chyba v signálu. Podívej se na graf výše.`;
            setTimeout(() => { if (streamActive && appState === 'IDLE') statusText.innerText = "Přilož vypnutou LED a zaškrtni políčko..."; }, 3000);
        }
        collectedSamples = [];
    }

    function calculateAlcohol() {
        const weight = parseFloat(document.getElementById('weight').value);
        const r = parseFloat(document.getElementById('gender').value);
        const foodFactor = parseFloat(document.getElementById('food').value);
        if (!weight || beers === 0) return;

        const alcoholGrams = beers * 20 * foodFactor; 
        let promile = (alcoholGrams / (weight * r)) - (0.15 * (minutes / 60));
        if (promile < 0) promile = 0;

        document.getElementById('promile-val').innerText = promile.toFixed(2) + " ‰";
        
        let funStat = document.getElementById('fun-status');
        if (promile === 0) funStat.innerText = "Jsi naprosto střízlivý.";
        else if (promile < 0.5) funStat.innerText = "Veselý začátek...";
        else if (promile < 1.2) funStat.innerText = "Ideální provozní teplota! 🚀";
        else funStat.innerText = "Zpívej, dokud to jde! 🎤";
    }
</script>
</body>
</html>
