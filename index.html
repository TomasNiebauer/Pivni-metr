<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pivní Metr & Teleport Dat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: #1e1e1e;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; color: #00e5ff; margin-bottom: 20px; font-size: 24px; text-shadow: 0 0 10px rgba(0,229,255,0.2); }
        
        .camera-container {
            position: relative;
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 15px;
            border: 2px solid #333;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .target-box {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 35px;
            height: 35px;
            border: 3px dashed #00e5ff;
            border-radius: 6px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        /* Indikátor modrého signálu */
        .signal-container {
            width: 100%;
            background: #222;
            border-radius: 6px;
            height: 20px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #333;
            position: relative;
        }
        .signal-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #002244, #00e5ff);
            transition: width 0.05s ease;
        }
        .signal-text {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            line-height: 20px;
            color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        .setup-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
            background: #2a2a2a;
            padding: 12px;
            border-radius: 8px;
        }
        select, input {
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 6px;
            font-size: 16px;
            width: 100%;
        }

        .results {
            background: #252525;
            padding: 15px;
            border-radius: 12px;
            border-left: 4px solid #00e5ff;
            margin-bottom: 15px;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 16px;
        }
        .value { font-weight: bold; color: #fff; }
        .promile-large {
            text-align: center;
            font-size: 46px;
            font-weight: bold;
            color: #fff;
            margin: 10px 0;
        }
        .status-text {
            text-align: center;
            font-size: 14px;
            color: #00e5ff;
            font-weight: bold;
            min-height: 20px;
        }
        
        button {
            width: 100%;
            background: #00e5ff;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        #analyzer-canvas { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>💙 PIVNÍ TELEPORT</h1>
    
    <div class="camera-container">
        <video id="webcam" autoplay playsinline muted></video>
        <div class="target-box" id="target-box"></div>
    </div>

    <div class="signal-container">
        <div class="signal-bar" id="signal-bar"></div>
        <div class="signal-text" id="signal-text">SIGNÁL LED: 0%</div>
    </div>

    <div class="setup-form">
        <div>
            <span style="font-size: 12px; color: #aaa;">Pohlaví</span>
            <select id="gender">
                <option value="0.7">Muž</option>
                <option value="0.6">Žena</option>
            </select>
        </div>
        <div>
            <span style="font-size: 12px; color: #aaa;">Váha (kg)</span>
            <input type="number" id="weight" value="77" min="40" max="200">
        </div>
    </div>

    <div class="results">
        <div class="result-row">
            <span>Počet piv (11° / 0.5l):</span>
            <span class="value" id="beer-count-val">0 ks</span>
        </div>
        <div class="result-row">
            <span>Doba od 1. loku:</span>
            <span class="value" id="time-val">0 min</span>
        </div>
        <div class="promile-large" id="promile-val">0.00 ‰</div>
        <div class="status-text" id="status-text">Kamera vypnuta</div>
    </div>

    <button id="start-cam-btn">Spustit skenování</button>
    <canvas id="analyzer-canvas" width="30" height="30"></canvas>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('analyzer-canvas');
    const ctx = canvas.getContext('2d');
    const statusText = document.getElementById('status-text');
    const startBtn = document.getElementById('start-cam-btn');
    const signalBar = document.getElementById('signal-bar');
    const signalText = document.getElementById('signal-text');
    const targetBox = document.getElementById('target-box');

    document.getElementById('weight').value = localStorage.getItem('alko_weight') || 77;
    document.getElementById('gender').value = localStorage.getItem('alko_gender') || 0.7;
    document.getElementById('weight').addEventListener('input', (e) => { localStorage.setItem('alko_weight', e.target.value); calculateAlcohol(); });
    document.getElementById('gender').addEventListener('change', (e) => { localStorage.setItem('alko_gender', e.target.value); calculateAlcohol(); });

    let streamActive = false;
    let bitStream = [];
    let isDecoding = false;
    
    let beers = 0;
    let minutes = 0;

    startBtn.addEventListener('click', async () => {
        if (streamActive) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment', frameRate: { ideal: 60 } },
                audio: false
            });
            video.srcObject = stream;
            streamActive = true;
            startBtn.style.display = 'none';
            statusText.innerText = "Zamiř modrou LED na terč...";
            processFrame();
        } catch (err) {
            statusText.innerText = "Chyba kamery: " + err.message;
        }
    });

    function getBlueIntensity() {
        if (!streamActive || video.videoWidth === 0) return 0;
        
        ctx.drawImage(video, video.videoWidth/2 - 15, video.videoHeight/2 - 15, 30, 30, 0, 0, 30, 30);
        const imgData = ctx.getImageData(0, 0, 30, 30);
        
        let totalBlue = 0;
        let totalRedGreen = 0;

        for (let i = 0; i < imgData.data.length; i += 4) {
            let r = imgData.data[i];
            let g = imgData.data[i+1];
            let b = imgData.data[i+2];

            totalBlue += b;
            totalRedGreen += (r + g) / 2;
        }

        let avgBlue = totalBlue / (30 * 30);
        let avgRedGreen = totalRedGreen / (30 * 30);

        let blueDominance = avgBlue - avgRedGreen;
        if (blueDominance < 0) blueDominance = 0;

        return Math.min(Math.round((blueDominance / 140) * 100), 100);
    }

    function processFrame() {
        if (!streamActive) return;
        
        let blueSignal = getBlueIntensity();
        
        signalBar.style.width = blueSignal + "%";
        signalText.innerText = `SIGNÁL LED: ${blueSignal}%`;

        // Citlivost na rozsvícení (30 %)
        let bit = (blueSignal > 30) ? 1 : 0;
        bitStream.push(bit);
        if (bitStream.length > 300) bitStream.shift();

        if (!isDecoding) {
            // Zjišťujeme, zda LED svítí trvale (průvodní sekvence spárování)
            let recent = bitStream.slice(-30); // cca 0.4 sekundy zpět
            let solidOnCount = recent.filter(b => b === 1).length;
            
            // JASNÁ ZPĚTNÁ VAZBA: Pokud web vidí solidní signál, dá ti vědět, že detekoval začátek
            if (solidOnCount > 25 && recent.length >= 30) {
                isDecoding = true;
                
                // Vizuální akce na webu: Terč zezelená a ohlásí synchronizaci!
                targetBox.style.borderColor = "#4caf50"; 
                targetBox.style.borderStyle = "solid";
                statusText.innerText = "🔒 SYNC: Drž stabilně, foťák ostří...";
                
                bitStream = [];
                
                // Počkáme 1.6 vteřiny (zbytek té 2vteřinové přípravy ATtiny), než čip začne blikat data
                setTimeout(() => {
                    statusText.innerText = "⚡ PŘENOS: Stahuji data z paměti čipu...";
                    targetBox.style.borderColor = "#ff9800"; // Terč zoranžoví při stahování dat
                    bitStream = [];
                    
                    // Nahráváme bity 450 milisekund
                    setTimeout(decodeOpticalData, 450);
                }, 1600);
            }
        }

        requestAnimationFrame(processFrame);
    }

    function decodeOpticalData() {
        // Vrátíme terč do původního stavu
        targetBox.style.borderColor = "#00e5ff";
        targetBox.style.borderStyle = "dashed";

        let pulses = 0;
        for(let i = 1; i < bitStream.length; i++) {
            if(bitStream[i] !== bitStream[i-1]) pulses++;
        }

        // Diagnostický výpis: pokud se nic nestáhlo, napíšeme kolik pulsů web reálně zachytil
        if (pulses > 4) {
            beers = Math.floor(pulses / 4) || 1; 
            if(beers > 35) beers = 4; // Bezpečnostní strop
            minutes = Math.floor(pulses * 3.2) || 10;
            
            document.getElementById('beer-count-val').innerText = beers + " ks";
            document.getElementById('time-val').innerText = minutes + " min";
            
            statusText.innerText = "Data úspěšně přenesena! 🍻";
            calculateAlcohol();
        } else {
            statusText.innerText = `Chyba přenosu (Zachyceno jen ${pulses} změn). Zkus to blíž.`;
        }
        
        setTimeout(() => {
            isDecoding = false;
            if(streamActive) statusText.innerText = "Připraveno na další teleport...";
            bitStream = [];
        }, 3500);
    }

    function calculateAlcohol() {
        const weight = parseFloat(document.getElementById('weight').value);
        const r = parseFloat(document.getElementById('gender').value);
        
        if (!weight || beers === 0) return;

        const alcoholGrams = beers * 20; 
        let promile = (alcoholGrams / (weight * r)) - (0.15 * (minutes / 60));
        if (promile < 0) promile = 0;

        document.getElementById('promile-val').innerText = promile.toFixed(2) + " ‰";
        
        const promileDiv = document.getElementById('promile-val');
        if (promile === 0) { promileDiv.style.color = "#fff"; }
        else if (promile < 0.5) { promileDiv.style.color = "#4caf50"; statusText.innerText = "Veselý začátek..."; }
        else if (promile < 1.2) { promileDiv.style.color = "#00e5ff"; statusText.innerText = "Ideální provozní teplota! 🚀"; }
        else if (promile < 2.0) { promileDiv.style.color = "#ff9800"; statusText.innerText = "Zpívej, dokud to jde! 🎤"; }
        else { promileDiv.style.color = "#f44336"; statusText.innerText = "Volat taxi a spát. 💀"; }
    }
</script>
</body>
</html>
